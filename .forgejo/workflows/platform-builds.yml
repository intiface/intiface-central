name: Platform Builds

on:
  workflow_dispatch:
  push:
    branches:
      - ci/windows-builder
    tags:
      - 'v*'

concurrency:
  group: platform-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-amd64:
    runs-on: linux-amd64
    timeout-minutes: 120
    env:
      BUTTPLUG_REF: mdnsfix
      BUTTPLUG_DART_REF: master

    defaults:
      run:
        shell: bash
        working-directory: intiface-central

    steps:
      - name: Checkout Intiface Central
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          path: intiface-central

      - name: Clone sibling dependencies
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          rm -rf buttplug buttplug_dart

          git clone --depth 1 --branch "$BUTTPLUG_REF" https://forgejo.buttplug.haus/qdot/buttplug.git buttplug
          git clone --depth 1 --branch "$BUTTPLUG_DART_REF" https://forgejo.buttplug.haus/qdot/buttplug_dart.git buttplug_dart

      - name: Install Linux build dependencies
        run: |
          set -euo pipefail

          if command -v apt-get >/dev/null 2>&1; then
            SUDO=""
            if [ "${EUID:-$(id -u)}" -ne 0 ]; then
              SUDO="sudo"
            fi

            $SUDO apt-get update -y
            $SUDO apt-get install -y \
              clang \
              cmake \
              curl \
              default-jdk \
              git \
              libcurl4-openssl-dev \
              libgtk-3-dev \
              libudev-dev \
              ninja-build \
              pkg-config \
              unzip \
              xz-utils \
              zip
          fi

      - name: Install Linux toolchains
        run: |
          set -euo pipefail

          if ! command -v rustc >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal
          fi

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"

          if ! command -v flutter >/dev/null 2>&1; then
            rm -rf "$HOME/flutter"
            git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          fi

          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/flutter/bin:$PATH"

          flutter config --no-analytics
          dart --disable-analytics

      - name: Tool versions
        run: |
          set -euo pipefail

          git --version
          rustc --version
          cargo --version
          FLUTTER_COMMAND="$(command -v flutter)"
          FLUTTER_ROOT="$(cd "$(dirname "$(dirname "$FLUTTER_COMMAND")")" && pwd)"
          git config --global --add safe.directory "$FLUTTER_ROOT"
          flutter --version
          flutter doctor -v

      - name: Derive build version
        run: |
          set -euo pipefail

          PUBSPEC_VERSION="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Could not find version in pubspec.yaml" >&2
            exit 1
          fi

          BUILD_NAME="${PUBSPEC_VERSION%%+*}"
          BUILD_NUMBER="${PUBSPEC_VERSION#*+}"
          if [ "$BUILD_NUMBER" = "$PUBSPEC_VERSION" ]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi

          {
            echo "BUILD_NAME=$BUILD_NAME"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Rust check
        run: cargo check --manifest-path rust/Cargo.toml --release --message-format short

      - name: Flutter build
        run: |
          set -euo pipefail

          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --dart-define "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
            --dart-define "DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}"

      - name: Zip Linux bundle
        run: |
          set -euo pipefail

          ZIP="$PWD/intiface-central-linux-amd64.zip"
          rm -f "$ZIP"

          cd build/linux/x64/release/bundle
          zip -r "$ZIP" ./*

          cd "$GITHUB_WORKSPACE/intiface-central/linux"
          zip -u "$ZIP" \
            com.nonpolynomial.intiface_central.desktop \
            com.nonpolynomial.intiface_central.metainfo.xml \
            run_intiface_central

      - name: Upload Linux artifacts
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: linux-amd64-build
          path: intiface-central/intiface-central-linux-amd64.zip
          if-no-files-found: error

  macos-universal:
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      BUTTPLUG_REF: mdnsfix
      BUTTPLUG_DART_REF: master

    defaults:
      run:
        shell: bash
        working-directory: intiface-central

    steps:
      - name: Checkout Intiface Central
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          path: intiface-central

      - name: Clone sibling dependencies
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          rm -rf buttplug buttplug_dart

          git clone --depth 1 --branch "$BUTTPLUG_REF" https://forgejo.buttplug.haus/qdot/buttplug.git buttplug
          git clone --depth 1 --branch "$BUTTPLUG_DART_REF" https://forgejo.buttplug.haus/qdot/buttplug_dart.git buttplug_dart

      - name: Tool versions
        run: |
          set -euo pipefail

          git --version
          rustc --version
          cargo --version
          xcodebuild -version
          FLUTTER_COMMAND="$(command -v flutter)"
          FLUTTER_ROOT="$(cd "$(dirname "$(dirname "$FLUTTER_COMMAND")")" && pwd)"
          git config --global --add safe.directory "$FLUTTER_ROOT"
          flutter --version
          flutter doctor -v

      - name: Derive build version
        run: |
          set -euo pipefail

          PUBSPEC_VERSION="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Could not find version in pubspec.yaml" >&2
            exit 1
          fi

          BUILD_NAME="${PUBSPEC_VERSION%%+*}"
          BUILD_NUMBER="${PUBSPEC_VERSION#*+}"
          if [ "$BUILD_NUMBER" = "$PUBSPEC_VERSION" ]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi

          {
            echo "BUILD_NAME=$BUILD_NAME"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Add macOS Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build macOS app
        run: |
          set -euo pipefail

          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release --config-only \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --dart-define "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
            --dart-define "DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}"

          DERIVED_DATA_PATH="$PWD/build/macos/DerivedData"
          rm -rf "$DERIVED_DATA_PATH"

          xcodebuild build \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination "generic/platform=macOS" \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release/Intiface Central.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find macOS app bundle at $APP_PATH" >&2
            find "$DERIVED_DATA_PATH/Build/Products" -maxdepth 4 -print >&2 || true
            exit 1
          fi

          EXECUTABLE="$APP_PATH/Contents/MacOS/Intiface Central"
          lipo -info "$EXECUTABLE"
          lipo "$EXECUTABLE" -verify_arch x86_64 arm64

          while IFS= read -r binary; do
            if file "$binary" | grep -q "Mach-O"; then
              lipo "$binary" -verify_arch x86_64 arm64
            fi
          done < <(find "$APP_PATH" -type f)

          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "$PWD/intiface-central-macos-universal-app.zip"

      - name: Upload macOS artifacts
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: macos-universal-build
          path: intiface-central/intiface-central-macos-universal-app.zip
          if-no-files-found: error

  ios:
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      BUTTPLUG_REF: mdnsfix
      BUTTPLUG_DART_REF: master

    defaults:
      run:
        shell: bash
        working-directory: intiface-central

    steps:
      - name: Checkout Intiface Central
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          path: intiface-central

      - name: Clone sibling dependencies
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          rm -rf buttplug buttplug_dart

          git clone --depth 1 --branch "$BUTTPLUG_REF" https://forgejo.buttplug.haus/qdot/buttplug.git buttplug
          git clone --depth 1 --branch "$BUTTPLUG_DART_REF" https://forgejo.buttplug.haus/qdot/buttplug_dart.git buttplug_dart

      - name: Tool versions
        run: |
          set -euo pipefail

          git --version
          rustc --version
          cargo --version
          xcodebuild -version
          FLUTTER_COMMAND="$(command -v flutter)"
          FLUTTER_ROOT="$(cd "$(dirname "$(dirname "$FLUTTER_COMMAND")")" && pwd)"
          git config --global --add safe.directory "$FLUTTER_ROOT"
          flutter --version
          flutter doctor -v

      - name: Derive build version
        run: |
          set -euo pipefail

          PUBSPEC_VERSION="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Could not find version in pubspec.yaml" >&2
            exit 1
          fi

          BUILD_NAME="${PUBSPEC_VERSION%%+*}"
          BUILD_NUMBER="${PUBSPEC_VERSION#*+}"
          if [ "$BUILD_NUMBER" = "$PUBSPEC_VERSION" ]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi

          {
            echo "BUILD_NAME=$BUILD_NAME"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Add iOS Rust target
        run: rustup target add aarch64-apple-ios

      - name: Build iOS app
        run: |
          set -euo pipefail

          flutter pub get
          flutter build ios --release --no-codesign \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --dart-define "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
            --dart-define "DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}"

      - name: Zip iOS app bundle
        run: |
          set -euo pipefail

          APP_PATH="$PWD/build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find iOS app bundle at $APP_PATH" >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "$PWD/intiface-central-ios-app.zip"

      - name: Upload iOS artifacts
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: ios-build
          path: intiface-central/intiface-central-ios-app.zip
          if-no-files-found: error
